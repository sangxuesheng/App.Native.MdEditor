<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>调试页面</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>React 应用调试</h1>
    
    <h2>1. 检查 root 元素</h2>
    <div id="test1">检测中...</div>
    
    <h2>2. 测试 ES Module 支持</h2>
    <div id="test2">检测中...</div>
    
    <h2>3. 测试主 JS 加载</h2>
    <div id="test3">检测中...</div>
    
    <h2>4. 控制台错误</h2>
    <pre id="errors">无错误</pre>
    
    <script>
        // 捕获错误
        const errors = [];
        window.addEventListener('error', (e) => {
            errors.push(`${e.message} at ${e.filename}:${e.lineno}`);
            updateErrors();
        });
        
        console.error = (function(oldError) {
            return function(...args) {
                errors.push(args.join(' '));
                updateErrors();
                oldError.apply(console, args);
            };
        })(console.error);
        
        function updateErrors() {
            document.getElementById('errors').textContent = errors.join('\n') || '无错误';
        }
        
        // 测试 1: root 元素
        const root = document.getElementById('root');
        if (root) {
            document.getElementById('test1').innerHTML = 
                '<span class="success">✓ root 元素存在</span>';
        } else {
            document.getElementById('test1').innerHTML = 
                '<span class="error">✗ root 元素不存在</span>';
        }
        
        // 测试 2: ES Module
        if ('noModule' in HTMLScriptElement.prototype) {
            document.getElementById('test2').innerHTML = 
                '<span class="success">✓ 浏览器支持 ES Modules</span>';
        } else {
            document.getElementById('test2').innerHTML = 
                '<span class="error">✗ 浏览器不支持 ES Modules</span>';
        }
        
        // 测试 3: 加载主 JS
        fetch('/assets/index-BAC4-Ebq.js')
            .then(r => r.text())
            .then(text => {
                document.getElementById('test3').innerHTML = 
                    `<span class="success">✓ 主 JS 文件可访问 (${(text.length/1024).toFixed(1)} KB)</span>`;
            })
            .catch(err => {
                document.getElementById('test3').innerHTML = 
                    `<span class="error">✗ 加载失败: ${err.message}</span>`;
            });
    </script>
    
    <hr>
    <h2>5. 尝试加载实际应用</h2>
    <p>下面会尝试加载实际的 React 应用：</p>
    <div id="root"></div>
    
    <script type="module" crossorigin src="/assets/index-BAC4-Ebq.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CZQOWO-f.css">
    
    <script>
        // 5秒后检查 React 是否挂载
        setTimeout(() => {
            const root = document.getElementById('root');
            if (root && root.children.length > 0) {
                alert('✓ React 应用已成功挂载！');
            } else {
                alert('✗ React 应用未挂载，请查看控制台错误');
                console.log('Root element:', root);
                console.log('Root innerHTML:', root.innerHTML);
            }
        }, 5000);
    </script>
</body>
</html>

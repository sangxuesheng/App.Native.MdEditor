<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试对话框尺寸</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        
        .dialog-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .dialog-content {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }
        
        /* SaveAsDialog 样式 */
        .dialog-content.save-as-dialog {
            width: 600px !important;
            height: 500px !important;
            max-width: 90vw !important;
            max-height: 85vh !important;
            display: flex;
            flex-direction: column;
            border: 3px solid red; /* 红色边框用于测试 */
        }
        
        .save-as-dialog {
            width: 600px !important;
            max-width: 90vw;
            height: 500px !important;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        
        .dialog-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .dialog-body {
            flex: 1;
            padding: 20px;
            overflow: auto;
        }
        
        .info {
            padding: 20px;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="info">
        <h2>对话框尺寸测试</h2>
        <p><strong>预期尺寸：</strong> 600px × 500px</p>
        <p><strong>说明：</strong> 下面的对话框应该显示为固定的 600px 宽 × 500px 高，带有红色边框。</p>
    </div>
    
    <div class="dialog-overlay">
        <div class="dialog-content save-as-dialog">
            <div class="dialog-header">
                <h2>另存为 - 测试</h2>
            </div>
            <div class="dialog-body">
                <p>这是一个测试对话框。</p>
                <p>如果样式正确，这个对话框应该是：</p>
                <ul>
                    <li>宽度：600px</li>
                    <li>高度：500px</li>
                    <li>红色边框（用于测试）</li>
                </ul>
                <p><strong>请用浏览器的开发者工具（F12）检查这个元素的实际尺寸。</strong></p>
            </div>
        </div>
    </div>
    
    <script>
        // 显示实际尺寸
        window.addEventListener('load', () => {
            const dialog = document.querySelector('.save-as-dialog');
            const width = dialog.offsetWidth;
            const height = dialog.offsetHeight;
            console.log('对话框实际尺寸:', width, 'x', height);
            alert(`对话框实际尺寸：${width}px × ${height}px\n\n预期尺寸：600px × 500px`);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试微信公众号导出</title>
</head>
<body>
    <h1>测试图片样式</h1>
    
    <h2>原始 HTML（预览区）</h2>
    <div id="preview">
        <figure class="image-figure">
            <img src="https://pic1.imgdb.cn/item/69a61149dcdb109d1d43dafd.png" 
                 alt="测试图片" 
                 style="width:33%;height:auto;">
        </figure>
    </div>
    
    <h2>转换后的 HTML（微信格式）</h2>
    <div id="wechat"></div>
    
    <script>
        // 模拟转换函数
        function convertToWechatFormat(html) {
            const container = document.createElement('div');
            container.innerHTML = html;
            
            const figures = container.querySelectorAll('figure, .image-figure');
            figures.forEach(figure => {
                const img = figure.querySelector('img');
                if (img) {
                    const section = document.createElement('section');
                    section.setAttribute('style', 'text-align: center; margin: 10px 0;');
                    
                    const newImg = img.cloneNode(true);
                    const imgStyle = img.getAttribute('style') || '';
                    
                    let finalStyle = imgStyle.trim();
                    if (finalStyle && !finalStyle.endsWith(';')) {
                        finalStyle += ';';
                    }
                    finalStyle += ' display: inline-block !important; max-width: 100% !important; height: auto !important;';
                    
                    newImg.setAttribute('style', finalStyle);
                    section.appendChild(newImg);
                    
                    figure.parentNode.replaceChild(section, figure);
                }
            });
            
            return container.innerHTML;
        }
        
        // 执行转换
        const previewHtml = document.getElementById('preview').innerHTML;
        const wechatHtml = convertToWechatFormat(previewHtml);
        document.getElementById('wechat').innerHTML = wechatHtml;
        
        // 显示转换后的样式
        console.log('转换后的 HTML:', wechatHtml);
    </script>
</body>
</html>
